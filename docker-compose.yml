# ===========================================
# MCP Enterprise Server — Docker Compose
# 快速启动：企业版 MCP Server + 监控
# ===========================================
#
# 使用方式：
#   docker-compose up -d
#   docker-compose logs -f
# ===========================================

version: "3.8"

services:
  # ===== MCP Enterprise Server =====
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-enterprise-server
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-default}
      - MCP_API_KEY=${MCP_API_KEY:-changeme-in-production}
      - JAVA_OPTS=-Xmx512m -Xms256m
    volumes:
      - mcp-data:/app/data
      - mcp-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - mcp-network

  # ===== Prometheus 监控（可选）=====
  prometheus:
    image: prom/prometheus:latest
    container_name: mcp-prometheus
    profiles:
      - monitoring
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    restart: unless-stopped
    networks:
      - mcp-network

  # ===== Grafana 仪表盘（可选）=====
  grafana:
    image: grafana/grafana:latest
    container_name: mcp-grafana
    profiles:
      - monitoring
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - mcp-network
    depends_on:
      - prometheus

volumes:
  mcp-data:
  mcp-logs:
  prometheus-data:
  grafana-data:

networks:
  mcp-network:
    driver: bridge
