name: MCP Enterprise CI/CD

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - '.gitignore'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      skip-tests:
        description: '跳过测试（用于紧急发布）'
        required: false
        default: false
        type: boolean

# GITHUB_TOKEN 需要 packages: write 以推送 Docker 镜像到 ghcr.io
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ 17, 21 ]
      fail-fast: false

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Java ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'
        cache: maven

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Build & Test
      run: mvn clean test -B -q
      env:
        MAVEN_OPTS: "-Xmx2g"

    - name: Package (skip test)
      if: ${{ !cancelled() }}
      run: mvn package -DskipTests -B -q

    - name: Upload JAR artifacts
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: mcp-enterprise-jdk${{ matrix.java }}
        path: |
          mcp-core/target/*.jar
          mcp-spring-boot-starter/target/*.jar
          mcp-server/target/*.jar
          mcp-tools/*/target/*.jar
          mcp-monitor/target/*.jar
        retention-days: 7

  # ===== 代码质量检查 =====
  quality:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'temurin'
        cache: maven

    - name: Checkstyle
      run: |
        mvn checkstyle:check -B -q || echo "Checkstyle warnings found (non-blocking)"

    - name: SpotBugs
      run: |
        mvn spotbugs:check -B -q || echo "SpotBugs findings found (non-blocking)"

  # ===== 集成测试（可选） =====
  integration-test:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    services:
      h2:
        image: oscarfonts/h2:latest
        ports:
          - 1521:1521
          - 81:81
        options: >-
          --health-cmd "curl -f http://localhost:81 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'temurin'
        cache: maven

    - name: Integration Tests
      run: mvn verify -Pintegration-test -B -q
      env:
        DB_URL: jdbc:h2:tcp://localhost:1521/~/test
        DB_USER: sa
        DB_PASS: ""

  # ===== Docker 镜像构建 =====
  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'temurin'
        cache: maven

    - name: Build Server JAR
      run: mvn package -DskipTests -pl mcp-server -am -B -q

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Lowercase repository owner & name
      id: repo_lower
      run: |
        echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
        echo "name=$(echo ${{ github.event.repository.name }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build & Push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ghcr.io/${{ env.owner }}/${{ env.name }}:latest
          ghcr.io/${{ env.owner }}/${{ env.name }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # ===== 发布到 GitHub Release =====
  release:
    runs-on: ubuntu-latest
    needs: [ build, quality ]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'temurin'
        cache: maven

    - name: Build Release JARs
      run: mvn package -DskipTests -B -q

    - name: Generate Release Notes
      id: release_notes
      run: |
        echo "## MCP Enterprise ${{ github.ref_name }}" > release-notes.md
        echo "" >> release-notes.md
        echo "### 变更内容" >> release-notes.md
        echo "- 详见 [GitHub commit history](https://github.com/${{ github.repository }}/commits/${{ github.sha }})" >> release-notes.md

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        body_path: release-notes.md
        files: |
          mcp-core/target/*.jar
          mcp-spring-boot-starter/target/*.jar
          mcp-server/target/*.jar
          mcp-tools/*/target/*.jar
          mcp-monitor/target/*.jar
        draft: false
        prerelease: false
