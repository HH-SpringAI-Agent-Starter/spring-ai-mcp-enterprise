apiVersion: v1
kind: Service
metadata:
  name: mcp-server
  namespace: mcp-enterprise
  labels:
    app.kubernetes.io/name: mcp-enterprise
    app.kubernetes.io/component: server
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8081"
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: mcp-enterprise
    app.kubernetes.io/component: server
