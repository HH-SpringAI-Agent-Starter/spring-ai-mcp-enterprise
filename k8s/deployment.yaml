apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: mcp-enterprise
  labels:
    app.kubernetes.io/name: mcp-enterprise
    app.kubernetes.io/component: server
    app.kubernetes.io/version: "0.0.2"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-enterprise
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-enterprise
        app.kubernetes.io/component: server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/api/mcp/actuator/prometheus"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: mcp-server
          image: ghcr.io/hh-springai-agent-starter/spring-ai-mcp-enterprise:0.0.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              protocol: TCP
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "auth"
            - name: MCP_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mcp-server-secret
                  key: jwt-secret
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx512m -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError"
          resources:
            requests:
              cpu: "250m"
              memory: "384Mi"
            limits:
              cpu: "1"
              memory: "768Mi"
          livenessProbe:
            httpGet:
              path: /api/admin/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/admin/health
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
          volumeMounts:
            - name: config
              mountPath: /workspace/config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: mcp-server-config
