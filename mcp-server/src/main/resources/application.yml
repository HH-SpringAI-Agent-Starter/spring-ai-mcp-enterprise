server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: mcp-enterprise-server

mcp:
  enterprise:
    server:
      port: 8081
    security:
      api-key-enabled: true
      rate-limit-enabled: true
      audit-log-enabled: true
    monitor:
      enabled: true
    registry:
      auto-scan-enabled: true
      scan-packages: com.mcp.tool

management:
  endpoints:
    web:
      exposure:
        include: health,info,mcp-enterprise
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.mcp: INFO
    org.springframework.ai: WARN
