server:
  port: ${PORT:8080}
  servlet:
    context-path: /

spring:
  application:
    name: mcp-enterprise-server

mcp:
  enterprise:
    server:
      port: 8081
    security:
      api-key-enabled: true
      rate-limit-enabled: true
      audit-log-enabled: true
    monitor:
      enabled: true
    registry:
      auto-scan-enabled: true
      scan-packages: com.mcp.tool

logging:
  level:
    com.mcp: INFO
    org.springframework.ai: WARN
