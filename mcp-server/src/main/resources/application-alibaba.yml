# ===========================================
# Spring AI Alibaba 集成配置示例
# 使用阿里云通义千问 + DashScope 作为 AI 后端
# ===========================================

spring:
  ai:
    # 阿里云 DashScope 配置
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:your-api-key-here}
      # 可选: 如果使用百炼平台
      # base-url: https://dashscope-intl.aliyuncs.com

    # 通义千问聊天模型
    chat:
      model: qwen-max
      options:
        temperature: 0.7
        max-tokens: 4096

    # 通义千问 Embedding 模型
    embedding:
      model: text-embedding-v3
      options:
        dimensions: 1024

    mcp:
      server:
        # MCP Server 端点（由本项目提供）
        endpoints:
          - url: http://localhost:8081/api/mcp
            transport: http
            headers:
              X-API-Key: ${MCP_API_KEY:default-admin-key}

      # Spring AI Alibaba MCP 自动配置
      alibaba:
        enabled: true
        # 连接超时
        connect-timeout: 10s
        # 调用超时
        read-timeout: 60s

# ===========================================
# 使用方式：
# 启动时指定 profile:
#   java -jar mcp-server.jar --spring.profiles.active=alibaba
# 或:
#   export DASHSCOPE_API_KEY=sk-xxxx
#   mvn spring-boot:run -Dspring-boot.run.profiles=alibaba
# ===========================================
