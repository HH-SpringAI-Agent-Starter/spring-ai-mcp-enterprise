# ===========================================
# Prometheus 监控配置（配合 docker-compose）
# ===========================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "mcp-enterprise-server"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["mcp-server:8081"]
        labels:
          application: "mcp-enterprise-server"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
